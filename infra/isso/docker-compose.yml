services:
  remark42:
    image: umputun/remark42:latest
    container_name: remark42
    environment:
      - REMARK_URL=https://comments.eauclairesangha.org
      - SITE=ec-buddhist-sangha
      - SECRET=6995d312f11f2668af4f8759c75ac574c84172cd8a95e61e1e728120f6a7c308
      - AUTH_GITHUB_CID=Ov23liCFq83Gu0SzJUeQ
      - AUTH_GITHUB_CSEC=6e2d234e7bec3cbbbf8f937daf51aa9ded3c8ef8
      - AUTH_ANON=false
      - ADMIN_SHARED_EMAIL=
    volumes:
      - remark-data:/srv/var
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: remark-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - remark42
    restart: unless-stopped

volumes:
  remark-data:
  caddy-data:
  caddy-config:
