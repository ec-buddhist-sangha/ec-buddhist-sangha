{{ define "main" }}
<section class="bg-sangha-light min-h-screen py-16">
  <div class="container mx-auto px-4 max-w-5xl">
    <h1 class="font-serif text-4xl font-bold text-sangha-navy mb-8 text-center">Community Updates</h1>
    <p class="text-gray-600 text-center mb-12 max-w-2xl mx-auto">Events, announcements, and news from the Eau Claire Buddhist Sangha.</p>

    <div id="ecbs-updates"
         data-admin-create="1"
         data-empty="No updates yet. Check back soon!">
      <p class="text-gray-500 text-center py-12">Loading updates…</p>
    </div>
    <noscript>
      <p class="text-gray-500 text-center py-12">Please enable JavaScript to view community updates.</p>
    </noscript>
  </div>
</section>
{{ $v := readFile "static/js/posts.js" | md5 }}
<script src="{{ "js/posts.js" | relURL }}?v={{ $v }}"></script>
{{ end }}
