{{ define "main" }}
<section class="bg-sangha-light min-h-screen py-10 md:py-14">
  <div class="container mx-auto px-4 max-w-6xl">
    <div class="mb-8">
      <p class="text-[10px] uppercase tracking-widest text-sangha-gold font-bold mb-2">Sangha Calendar</p>
      <h1 class="font-serif text-3xl md:text-4xl font-bold text-sangha-navy">{{ .Title }}</h1>
    </div>
    <div id="calendar-app" data-calendar-view="calendar" data-calendar-base="{{ "" | relURL }}" data-calendar-api="{{ if not hugo.IsServer }}{{ .Site.Params.calendarApiBase }}{{ end }}" data-calendar-local-dev="{{ hugo.IsServer }}"></div>
  </div>
</section>
{{ $calendarApiVersion := readFile "static/js/calendar-api.js" | md5 }}
{{ $calendarVersion := readFile "static/js/calendar.js" | md5 }}
<script src="{{ "js/calendar-api.js" | relURL }}?v={{ $calendarApiVersion }}"></script>
<script src="{{ "js/calendar.js" | relURL }}?v={{ $calendarVersion }}"></script>
{{ end }}
