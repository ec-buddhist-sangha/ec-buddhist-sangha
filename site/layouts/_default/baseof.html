<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    <meta name="description" content="{{ .Summary | default .Site.Params.site_description }}" />
    <link rel="icon" type="image/png" href="{{ "images/logo.png" | absURL }}" />
    <!-- Open Graph -->
    <meta property="og:title" content="{{ .Title }} | {{ .Site.Title }}" />
    <meta property="og:description" content="{{ .Summary | default .Site.Params.site_description }}" />
    <meta property="og:url" content="{{ .Permalink }}" />
    <meta property="og:site_name" content="{{ .Site.Title }}" />
    <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}" />
    <meta property="og:image" content="{{ "images/logo.png" | absURL }}" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="{{ .Title }} | {{ .Site.Title }}" />
    <meta name="twitter:description" content="{{ .Summary | default .Site.Params.site_description }}" />
    <meta name="twitter:image" content="{{ "images/logo.png" | absURL }}" />
    <link rel="stylesheet" href="{{ "css/output.css" | absURL }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    {{ range .AlternativeOutputFormats -}}
      {{ printf `<link rel="%s" type="%s" href="%s" title="%s" />` .Rel .MediaType.Type .Permalink $.Site.Title | safeHTML }}
    {{ end -}}
  </head>
  <body class="min-h-screen flex flex-col font-sans selection:bg-sangha-gold/30 bg-sangha-light">
    {{ partial "header" . }}
    <main class="flex-1">{{ block "main" . }}{{ end }}</main>
    {{ partial "footer" . }}
  </body>
</html>
