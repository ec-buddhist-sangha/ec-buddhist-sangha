{{ define "main" }}
<section class="bg-sangha-light min-h-screen py-12 md:py-16">
  <div class="max-w-4xl mx-auto px-4">
    <!-- Header -->
    <div class="mb-8">
      <h1 class="font-serif text-3xl font-bold text-sangha-navy">{{ .Title }}</h1>
      <p class="text-gray-500 mt-1">Discuss practice, books, and life.</p>
    </div>

    <!-- Topic list (client-rendered from /api/topics) -->
    <div id="ecbs-topics">
      <p class="text-gray-500 text-center py-12">Loading discussions…</p>
    </div>
    <noscript>
      <p class="text-gray-500 text-center py-12">Please enable JavaScript to view the forum.</p>
    </noscript>

    <!-- Right Speech callout -->
    <div class="mt-8 bg-blue-50 border border-blue-100 p-6 rounded-xl text-center">
      <h3 class="text-sangha-navy font-bold mb-2">Welcome to our Digital Sangha</h3>
      <p class="text-sm text-gray-600 max-w-md mx-auto">
        This space is for mindful discussion. Please adhere to Right Speech in all interactions.
      </p>
    </div>
  </div>
</section>
{{ $v := readFile "static/js/topics.js" | md5 }}
<script src="{{ "js/topics.js" | relURL }}?v={{ $v }}"></script>
{{ end }}
