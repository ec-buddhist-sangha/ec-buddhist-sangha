name = "sangha-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

# Non-secret vars (may also be set in the dashboard). Secrets are set with
# `wrangler secret put <NAME>` and are NEVER committed.
[vars]
GOOGLE_REDIRECT_URI = "https://sangha-worker.eau-claire-buddhist-sangha.workers.dev/auth/callback"
CORS_ORIGIN = "https://eauclairesangha.org"
REMARK42_URL = "https://comments.eauclairesangha.org"
REMARK42_SITE_ID = "ec-buddhist-sangha"

# Secrets (set via `wrangler secret put`):
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET
#   JWT_SIGNING_SECRET
#
# Added in later plans:
#   Plan 02: GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET
#   Plan 04: REMARK42_JWT_SECRET, REMARK42_URL
#   REMARK42_JWT_SECRET   (must equal Remark42's SECRET)  -> Plan 04 comments proxy
#   Plan 03 adds the [[d1_databases]] binding below.

[[d1_databases]]
binding = "DB"
database_name = "sangha-calendar"
# PLACEHOLDER — only used for local miniflare tests. Replace with the real id from
# `wrangler d1 create sangha-calendar` before deploying.
database_id = "PLACEHOLDER_LOCAL_ONLY"
