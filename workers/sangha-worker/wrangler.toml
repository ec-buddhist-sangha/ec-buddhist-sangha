name = "sangha-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
keep_vars = true

# Non-secret vars (may also be set in the dashboard). Secrets are set with
# `wrangler secret put <NAME>` and are NEVER committed.
[vars]
GOOGLE_REDIRECT_URI = "https://sangha-worker.eau-claire-buddhist-sangha.workers.dev/auth/callback"
CORS_ORIGIN = "https://eauclairesangha.org"
# Comma-separated, lowercased admin emails. These accounts are ALWAYS admin
# (lockout recovery) and receive access-request notifications.
# WARNING: keep_vars = true does NOT protect vars defined in this file — BOOTSTRAP_ADMINS must be set HERE (committed), not only in the Cloudflare dashboard, or a deploy will reset it and remove the lockout-recovery admins.
BOOTSTRAP_ADMINS = "jcortner@gmail.com,ccortner@gmail.com"
# From-address for notification email; must be on the Email-Routing-enabled domain.
NOTIFY_SENDER = "noreply@eauclairesangha.org"

# Secrets (set via `wrangler secret put`, never committed):
#   GOOGLE_CLIENT_ID
#   GOOGLE_CLIENT_SECRET
#   JWT_SIGNING_SECRET

[[d1_databases]]
binding = "DB"
database_name = "sangha-calendar"
# Real D1 database id (from `wrangler d1 create sangha-calendar`).
database_id = "634e9933-fe12-45c9-aada-e7ce14b595e7"

# Cloudflare Email Routing: send notification email to admins. Each address in
# allowed_destination_addresses must be verified once in the Email Routing UI.
[[send_email]]
name = "SEND_EMAIL"
allowed_destination_addresses = ["jcortner@gmail.com", "ccortner@gmail.com"]
